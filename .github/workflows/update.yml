name: Update vote data

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - run: uv run python scripts/fetch_votes.py
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}

      - name: Commit and push if data changed
        run: |
          git add data/members.json
          git diff --staged --quiet || git commit -m "Update vote data"
          git pull --rebase origin main
          git push
