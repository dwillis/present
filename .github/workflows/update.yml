name: Update vote data

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - run: uv run python scripts/fetch_votes.py
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update vote data"
          file_pattern: "data/members.json"
