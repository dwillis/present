<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Present — House Vote Tracker</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="container">
      <h1>Present</h1>
      <p class="tagline">How long since your representative voted?</p>
    </div>
  </header>

  <main class="container">
    <div class="controls">
      <div class="control-group">
        <label for="state-select">State</label>
        <select id="state-select">
          <option value="">All States</option>
        </select>
      </div>
      <div class="control-group">
        <label for="zip-input">Zip Code</label>
        <div class="zip-wrapper">
          <input type="text" id="zip-input" placeholder="e.g. 20742" maxlength="5" pattern="[0-9]{5}">
          <button id="zip-btn" type="button">Find</button>
        </div>
      </div>
      <div class="control-group">
        <label for="sort-select">Sort by</label>
        <select id="sort-select">
          <option value="absence">Longest absence first</option>
          <option value="recent">Most recent first</option>
          <option value="name">Name A-Z</option>
          <option value="state">State</option>
        </select>
      </div>
      <div class="control-group">
        <label>&nbsp;</label>
        <button id="reset-btn" type="button" class="reset-btn" hidden>Reset</button>
      </div>
    </div>

    <section id="leaderboard" class="leaderboard">
      <h2>Longest Without a Vote</h2>
      <ol id="leaderboard-list" class="leaderboard-list"></ol>
    </section>

    <h2 class="section-heading">All Members</h2>
    <div id="status" class="status"></div>

    <div id="members-grid" class="members-grid"></div>
  </main>

  <footer>
    <div class="container">
      <p>Data from <a href="https://api.congress.gov/" target="_blank" rel="noopener">Congress.gov API</a>.
        Updated <span id="updated-at"></span>.</p>
      <p>Tracks the most recent roll call vote cast by each U.S. House member.</p>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
